name: Test Sjalavard

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Copy index.html to expected path
        run: cp index.html /home/runner/sj_final.html

      - name: Run test suite
        run: python3 test_sjalavard.py
