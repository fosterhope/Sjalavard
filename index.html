// ── localStorage helpers (draft only) ────────────────────────
function lsKey(uid,k){return "sj_"+uid+"_"+k;}
function lsGet(k,d,uid){try{const key=uid?lsKey(uid,k):k;const v=localStorage.getItem(key);return v?JSON.parse(v):d;}catch{return d;}}
function lsSet(k,v,uid){try{const key=uid?lsKey(uid,k):k;localStorage.setItem(key,JSON.stringify(v));}catch{}}
function lsDel(k,uid){try{const key=uid?lsKey(uid,k):k;localStorage.removeItem(key);}catch{}}

// ── Helpers ───────────────────────────────────────────────────
function hexToRgb(hex){
  return parseInt(hex.slice(1,3),16)+","+parseInt(hex.slice(3,5),16)+","+parseInt(hex.slice(5,7),16);
}

function getGreeting(name){
  const h=new Date().getHours();
  const time=h<12?"morning":h<17?"afternoon":"evening";
  return name?"Good "+time+", "+name+".":"Good "+time+".";
}

function getDailyVerse(){
  const day = Math.floor(Date.now()/(1000*60*60*24));
  return DAILY_VERSES[day % DAILY_VERSES.length];
}

function hasCrisisContent(text){
  const lower = text.toLowerCase();
  return CRISIS_KEYWORDS.some(k=>lower.includes(k));
}

function buildSystem(p, sessions){
  const goals=p.goals&&p.goals.length?p.goals.map((g,i)=>(i+1)+". "+g).join("\n"):"Not specified.";
  const struggles=p.struggles&&p.struggles.length?p.struggles.join(", "):"Not specified.";
  const authorsLine=p.authors&&p.authors.length
    ?"\nThis person's favorite Christian authors are: "+p.authors.join(", ")+". Draw naturally on their thought when it genuinely fits. Never force a reference."
    :"\nDraw from Brennan Manning, Dallas Willard, Richard Foster, CS Lewis, and Dr. Caroline Leaf naturally.";
  let memoryLine="";
  if(sessions&&sessions.length>0){
    const recent=sessions.slice(0,5).filter(s=>s.opening||s.gratitude);
    if(recent.length>0){
      memoryLine="\n\nRecent session history (reference naturally if it connects, never force it):\n";
      memoryLine+=recent.map(s=>{
        let line=s.date+": ";
        if(s.opening) line+=s.opening.slice(0,120);
        if(s.moods&&s.moods.length) line+=" [Mood: "+s.moods.slice(0,2).join(", ")+"]";
        if(s.distortion) line+=" [Pattern: "+s.distortion+"]";
        if(s.actionStep) line+=" [Action step given: "+s.actionStep+"]";
        return line;
      }).join("\n");
    }
  }
  return "You are Sjal, a wise Christian life coach inside Sjalavard Soul Care.\nYou combine CBT (David Burns), neuroscience, biblical truth, and Spirit-led pastoral care.\nYour thinking is shaped by a rich library of voices — Brennan Manning on grace, Dallas Willard on spiritual formation, Richard Foster on disciplines, CS Lewis on truth and imagination, Henri Nouwen on the wounded healer, Dr. Caroline Leaf on the neuroscience of thought and mental health, and others. Draw from whichever voice genuinely fits the moment. Never force a reference. Often the insight matters more than the attribution. Let their wisdom inform how you think, not just what you quote."+authorsLine+"\nPrioritize grace, identity in Christ, and Spirit transformation.\n"+(p.firstName?"The persons name is "+p.firstName+".\n":"")+"Faith background: Christian.\nKey struggles: "+struggles+".\nGrowth goals:\n"+goals+"\nWatch for cognitive distortions. Be warm but direct. No flattery or filler.\nIf someone expresses thoughts of suicide or self-harm, gently acknowledge their pain, express care, and provide crisis resources (988 Suicide and Crisis Lifeline). Do not proceed with coaching until safety is addressed.\nSession arc: Opening=validate+1 question. Middle=name distortion+biblical perspective+1 question. Closing=summarize+reframe+prayer+pause statement.\nKeep sessions to 4-6 exchanges. This is holy ground."+memoryLine;
}

function sendWeeklyReport(uid, sessions){
  try{
    const lastKey="sj_"+uid+"_last_report";
    const last=localStorage.getItem(lastKey);
    const now=Date.now();
    if(last&&(now-parseInt(last))<7*24*60*60*1000) return;
    const weekAgo=now-7*24*60*60*1000;
    const thisWeek=sessions.filter(s=>{try{return new Date(s.savedAt||s.date).getTime()>weekAgo;}catch{return false;}});
    const topics=[];
    sessions.slice(0,10).forEach(s=>{
      if(s.distortion) topics.push(s.distortion);
      if(s.moods) topics.push(...s.moods.slice(0,1));
    });
    const topTopics=[...new Set(topics)].slice(0,5).join(", ");
    const fd=new FormData();
    fd.append("form-name","sjalavard-weekly-report");
    fd.append("week",new Date().toISOString().slice(0,10));
    fd.append("sessions_this_week",thisWeek.length);
    fd.append("top_topics",topTopics);
    fetch("/",{method:"POST",body:fd}).catch(()=>{});
    localStorage.setItem(lastKey,String(now));
  }catch(e){}
}

                <p style={{fontSize:11,color:C.dim,marginTop:6}}>Signed in as {email}</p>
              </div>
              <Btn onClick={()=>name.trim()&&setStep(2)} disabled={!name.trim()}>Continue →</Btn>
            </Card>
          </div>
        )}

        {step===2&&(
          <div className="fi">
            <Dots step={0} total={2}/>
            <div style={{textAlign:"center",marginBottom:22}}><SvgMark/><h2 style={{fontFamily:"'Playfair Display',serif",fontSize:24,color:C.white,fontWeight:600,marginBottom:6}}>What Do You Wrestle With?</h2><p style={{color:C.muted,fontSize:14}}>Select your common patterns.</p></div>
            <Card>
              <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:22}}>
                {STRUGGLES.map(s=>{const on=struggles.includes(s);return <button key={s} onClick={()=>toggleS(s)} style={{background:on?"rgba(91,184,212,0.2)":C.surf,border:"1.5px solid "+(on?C.acc:C.border),borderRadius:20,padding:"6px 12px",color:on?C.acc:C.muted,fontSize:12,cursor:"pointer",fontWeight:on?700:400}}>{s}</button>;})}
              </div>
              <Btn onClick={()=>setStep(3)} disabled={struggles.length===0}>Continue ({struggles.length} selected) →</Btn>
            </Card>
          </div>
        )}

        {step===3&&(
          <div className="fi">
            <Dots step={0} total={2}/>
            <div style={{textAlign:"center",marginBottom:22}}><SvgMark/><h2 style={{fontFamily:"'Playfair Display',serif",fontSize:24,color:C.white,fontWeight:600,marginBottom:6}}>Your Growth Goals</h2><p style={{color:C.muted,fontSize:14}}>What is God calling you toward?</p></div>
            <Card>
              <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:22}}>
                {GOALS.map(g=>{const on=goals.includes(g);return(
                  <button key={g} onClick={()=>toggleG(g)} style={{background:on?"rgba(91,184,212,0.15)":C.surf,border:"1.5px solid "+(on?C.acc:C.border),borderRadius:9,padding:"11px 14px",color:on?C.white:C.muted,fontSize:13,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:10}}>
                    <span style={{width:16,height:16,borderRadius:4,background:on?C.acc:C.border,flexShrink:0,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:10,color:C.bg,fontWeight:700}}>{on?"✓":""}</span>{g}
                  </button>
                );})}
              </div>
              <Btn onClick={()=>setStep(4)} disabled={goals.length===0}>Continue ({goals.length} selected) →</Btn>
            </Card>
          </div>
        )}

        {step===4&&(
          <div className="fi">
            <Dots step={1} total={2}/>
            <div style={{textAlign:"center",marginBottom:22}}><SvgMark/><h2 style={{fontFamily:"'Playfair Display',serif",fontSize:24,color:C.white,fontWeight:600,marginBottom:6}}>Your Favorite Christian Authors</h2><p style={{color:C.muted,fontSize:14,lineHeight:1.6}}>Select up to 10. Sjal will weave their voice into sessions when it fits.</p></div>
            <Card>
              <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:18}}>
                {ALL_AUTHORS.map(a=>{const on=authors.includes(a);const maxed=authors.length>=10&&!on;return(
                  <button key={a} onClick={()=>!maxed&&toggleA(a)} style={{background:on?"rgba(91,184,212,0.2)":C.surf,border:"1.5px solid "+(on?C.acc:C.border),borderRadius:20,padding:"6px 12px",color:on?C.acc:maxed?C.dim:C.muted,fontSize:12,cursor:maxed?"default":"pointer",fontWeight:on?700:400,opacity:maxed?0.5:1}}>{a}</button>
                );})}
              </div>
              <div style={{marginBottom:18}}>
                <label style={{fontSize:11,color:C.muted,letterSpacing:1,textTransform:"uppercase",fontWeight:600,display:"block",marginBottom:7}}>Others not listed (comma-separated)</label>
                <input value={authorsOther} onChange={e=>setAuthorsOther(e.target.value)} placeholder="e.g. Dietrich Bonhoeffer, Corrie ten Boom" style={{width:"100%",background:C.surf,border:"1.5px solid "+C.border,borderRadius:10,padding:"11px 14px",color:C.white,fontSize:14}}/>
              </div>
              <p style={{fontSize:11,color:C.dim,marginBottom:16,textAlign:"center"}}>{authors.length}/10 selected</p>
              <Btn onClick={finish}>Enter Sjalavard →</Btn>
              <button onClick={finish} style={{width:"100%",marginTop:10,padding:"11px",background:"transparent",border:"none",color:C.dim,fontSize:13,cursor:"pointer"}}>Skip</button>
            </Card>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────

function App({uid, email, onLogout}){
  const [profile,setProfile]=useState({});
  const [sessions,setSessions]=useState([]);
  const [appReady,setAppReady]=useState(false);
  const [phase,setPhase]=useState("mood");
  const [moods,setMoods]=useState([]);
  const [text,setText]=useState("");
  const [msgs,setMsgs]=useState([]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const [distortion,setDistortion]=useState(null);
  const [err,setErr]=useState(null);
  const [lastHist,setLastHist]=useState(null);
  const [tab,setTab]=useState("session");
  const [restored,setRestored]=useState(false);
  const [gratitude,setGratitude]=useState(["","",""]);
  const [summary,setSummary]=useState("");
  const [summaryLoading,setSummaryLoading]=useState(false);
  const [actionStep,setActionStep]=useState("");
  const [expanded,setExpanded]=useState(null);
  const [logoutConfirm,setLogoutConfirm]=useState(false);
  const [editAuthors,setEditAuthors]=useState(false);
  const [editAuthorsList,setEditAuthorsList]=useState([]);
  const [editAuthorsOther,setEditAuthorsOther]=useState("");
  const [showCrisis,setShowCrisis]=useState(false);
  const [checkinMood,setCheckinMood]=useState("");
  const [checkinNote,setCheckinNote]=useState("");
  const [checkinDone,setCheckinDone]=useState(false);
  const [prayerEntries,setPrayerEntries]=useState([]);
  const [prayerInput,setPrayerInput]=useState("");
  const [prayerTitle,setPrayerTitle]=useState("");
  const bottomRef=useRef(null);

  useEffect(()=>{
    async function load(){
      const [p,s]=await Promise.all([dbGetProfile(uid),dbGetSessions(uid)]);
      const prof=p||{};
      setProfile(prof);
      setSessions(s||[]);
      setEditAuthorsList(prof.authors||[]);
      const prayers=lsGet("prayers",[],uid);
      setPrayerEntries(prayers);
      const todayKey=new Date().toLocaleDateString("en-US");
      const ci=lsGet("checkin_"+todayKey,null,uid);
      if(ci) setCheckinDone(true);
      const d=lsGet("draft",null,uid);
      if(d&&(d.msgs&&d.msgs.length>0||d.text)){
        setMoods(d.moods||[]);setText(d.text||"");setMsgs(d.msgs||[]);
        setDistortion(d.distortion||null);setPhase(d.phase||"mood");setRestored(true);
      }
      sendWeeklyReport(uid,s||[]);
      setAppReady(false);
      setAppReady(true);
    }
    load();
  },[]);

  useEffect(()=>{
    if(phase==="mood"&&moods.length===0)return;
    lsSet("draft",{phase,moods,text,msgs,distortion},uid);
  },[phase,moods,text,msgs,distortion]);

  useEffect(()=>{bottomRef.current&&bottomRef.current.scrollIntoView({behavior:"smooth"});},[msgs,loading]);

  const moodObjs=moods.map(l=>MOODS.find(m=>m.l===l)).filter(Boolean);
  const firstName=profile.firstName?profile.firstName.split(" ")[0]:"";
  const sysPrompt=buildSystem(profile,sessions);
  const verse=getDailyVerse();

  function checkForCrisis(t){
    if(hasCrisisContent(t)) setShowCrisis(true);
  }

  async function callCoach(hist){
    setLoading(true);setLastHist(hist);setErr(null);
    try{
      const count=hist.filter(m=>m.role==="user").length;
      const close=count>=5?"\n\nINSTRUCTION: Close this session now. Summarize key insight, offer a reframe, close with a short prayer, end with 'This feels like a good place to pause.'":"";
      const res=await fetch("/api/gemini",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({systemInstruction:{parts:[{text:sysPrompt+close}]},contents:hist.map(m=>({role:m.role==="assistant"?"model":"user",parts:[{text:m.content}]})),generationConfig:{maxOutputTokens:3000}})});
      if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e&&e.error&&e.error.message||"Error "+res.status);}
      const data=await res.json();
      const reply=data.candidates&&data.candidates[0]&&data.candidates[0].content&&data.candidates[0].content.parts&&data.candidates[0].content.parts[0]&&data.candidates[0].content.parts[0].text||"I am here. Take your time.";
      setMsgs(prev=>[...prev,{role:"coach",content:reply}]);
    }catch(e){setErr(e.message||"Connection interrupted.");}
    setLoading(false);
  }

  async function startSession(){
    if(!text.trim())return;
    checkForCrisis(text);
    const ms=moods.map((l,i)=>["Primary","Secondary","Third"][i]+" mood: "+l).join(", ");
    setMsgs([{role:"user",content:text}]);setPhase("coach");
    await callCoach([{role:"user",content:"My moods: "+ms+".\n\n"+text}]);
  }

  async function sendMsg(){
    if(!input.trim()||loading)return;
    checkForCrisis(input);
    const m=input.trim();setInput("");setErr(null);
    const updated=[...msgs,{role:"user",content:m}];setMsgs(updated);
    const ms=moods.map((l,i)=>["Primary","Secondary","Third"][i]+" mood: "+l).join(", ");
    await callCoach([{role:"user",content:"Moods: "+ms+". Opening: "+(msgs[0]&&msgs[0].content||"")}, ...updated.slice(1).map(x=>({role:x.role==="coach"?"assistant":"user",content:x.content}))]);
  }

  async function generateSummary(){
    setSummaryLoading(true);setSummary("");setActionStep("");setPhase("summary");
    try{
      const distortionLine=distortion?"Cognitive distortion identified: "+distortion+".":"No specific cognitive distortion was named.";
      const history=msgs.map(function(m){return(m.role==="coach"?"Sjal":"User")+": "+m.content;}).join("\n");
      const prompt="Based on this soul care session, provide two things:\n1) A brief warm closing summary (3-5 sentences) covering: the core theme, a key insight or reframe, and "+distortionLine+" End with one short sentence of encouragement.\n2) On a new line starting with 'ACTION:' write ONE concrete, specific action step the person can take before their next session. Make it simple, doable, and spiritually grounded.\n\nSession:\n"+history;
      const res=await fetch("/api/gemini",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{role:"user",parts:[{text:prompt}]}],generationConfig:{maxOutputTokens:400}})});
      const data=await res.json();
      const reply=data.candidates&&data.candidates[0]&&data.candidates[0].content&&data.candidates[0].content.parts&&data.candidates[0].content.parts[0]&&data.candidates[0].content.parts[0].text||"";
      const actionMatch=reply.match(/ACTION:\s*(.+)/s);
      if(actionMatch){
        setActionStep(actionMatch[1].trim().split("\n")[0]);
        setSummary(reply.replace(/ACTION:[\s\S]*/,"").trim());
      }else{
        setSummary(reply||"This was a meaningful time. Carry what was shared with you today.");
      }
    }catch(e){setSummary("This was a meaningful time. Carry what was shared with you today.");}
    setSummaryLoading(false);
  }

  async function saveSession(){
    const s={
      date:new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"}),
      time:new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"}),
      savedAt:Date.now(),
      moods:[...moods],distortion,msgs:[...msgs],opening:text,gratitude:[...gratitude],summary,actionStep,
    };
    await dbAddSession(uid,s);
    setSessions(prev=>[s,...prev]);
    lsDel("draft",uid);
    setPhase("mood");setMoods([]);setText("");setMsgs([]);setInput("");
    setDistortion(null);setErr(null);setLastHist(null);setRestored(false);setGratitude(["","",""]);setSummary("");setActionStep("");
  }

  function toggleMood(l){
    const i=moods.indexOf(l);
    if(i>-1)setMoods(p=>p.filter(x=>x!==l));
    else if(moods.length<3)setMoods(p=>[...p,l]);
  }

  async function saveEditedAuthors(){
    const extras=editAuthorsOther.split(",").map(s=>s.trim()).filter(Boolean);
    const merged=[...editAuthorsList,...extras].slice(0,10);
    const updated={...profile,authors:merged};
    setProfile(updated);
    await dbSetProfile(uid,email,updated);
    setEditAuthors(false);
  }

  function saveCheckin(){
    if(!checkinMood)return;
    const todayKey=new Date().toLocaleDateString("en-US");
    const entry={date:todayKey,mood:checkinMood,note:checkinNote,time:new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"})};
    lsSet("checkin_"+todayKey,entry,uid);
    setCheckinDone(true);
  }

  function savePrayer(){
    if(!prayerInput.trim())return;
    const entry={id:Date.now(),title:prayerTitle.trim()||"Prayer",text:prayerInput.trim(),date:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),answered:false};
    const updated=[entry,...prayerEntries];
    setPrayerEntries(updated);
    lsSet("prayers",updated,uid);
    setPrayerInput("");setPrayerTitle("");
  }

  function togglePrayerAnswered(id){
    const updated=prayerEntries.map(p=>p.id===id?{...p,answered:!p.answered}:p);
    setPrayerEntries(updated);
    lsSet("prayers",updated,uid);
  }

  function deletePrayer(id){
    const updated=prayerEntries.filter(p=>p.id!==id);
    setPrayerEntries(updated);
    lsSet("prayers",updated,uid);
  }

  // Mood trend data — last 14 days of check-ins
  function getMoodTrends(){
    const days=[];
    const moodScores={"Hopeless":1,"Ashamed":2,"Anxious":2,"Overwhelmed":2,"Angry":3,"Lonely":3,"Fearful":3,"Discouraged":3,"Envious":3,"Jealous":3,"Not Enough":3,"Restless":4,"Worried":4,"Stuck":4,"Offended":4,"Frustrated":4,"Distracted":5,"Weary":5,"Unfocused":5,"Fragmented":5};
    for(let i=13;i>=0;i--){
      const d=new Date();d.setDate(d.getDate()-i);
      const key=d.toLocaleDateString("en-US");
      const ci=lsGet("checkin_"+key,null,uid);
      const sessionMoods=sessions.filter(s=>s.date&&s.date.includes(d.toLocaleDateString("en-US",{month:"long",day:"numeric"}))).flatMap(s=>s.moods||[]);
      const mood=ci?ci.mood:sessionMoods[0]||null;
      const score=mood?(moodScores[mood]||5):null;
      days.push({label:d.toLocaleDateString("en-US",{weekday:"short"}).slice(0,1),score,mood,date:key});
    }
    return days;
  }

  const progPhases=["mood","share","coach","summary","gratitude"];
  const progIdx=progPhases.indexOf(phase);

  if(!appReady) return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center"}}><SvgMark/><p style={{color:C.muted,fontSize:13,letterSpacing:1,textTransform:"uppercase"}}>Loading your space...</p></div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.white}}>

      <div style={{background:"rgba(12,28,42,0.95)",backdropFilter:"blur(8px)",borderBottom:"1px solid "+C.border,position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:700,margin:"0 auto",padding:"0 20px",display:"flex",alignItems:"center",justifyContent:"space-between",height:56}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <svg width="24" height="24" viewBox="0 0 72 72" fill="none">
              <rect width="72" height="72" rx="14" fill="rgba(91,184,212,0.2)"/>
              <line x1="36" y1="18" x2="36" y2="54" stroke={C.acc} strokeWidth="2.5" strokeLinecap="round"/>
              <line x1="22" y1="36" x2="50" y2="36" stroke={C.acc} strokeWidth="2.5" strokeLinecap="round"/>
              <circle cx="36" cy="36" r="6" stroke={C.acc} strokeWidth="1.5" fill="none"/>
            </svg>
            <span style={{fontFamily:"'Playfair Display',serif",fontSize:17,fontWeight:600,letterSpacing:-0.3}}>Sjalavard</span>
            <span style={{fontSize:10,color:C.muted,letterSpacing:1,textTransform:"uppercase"}}>Soul Care</span>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <span style={{fontSize:11,color:C.dim}}>{new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>
            <button onClick={()=>setLogoutConfirm(true)} style={{background:"transparent",border:"1px solid "+C.border,borderRadius:7,padding:"4px 10px",color:C.dim,fontSize:10,cursor:"pointer",fontWeight:600,letterSpacing:0.5}}>SIGN OUT</button>
          </div>
        </div>
      </div>

      <div style={{background:C.surf,borderBottom:"1px solid "+C.border}}>
        <div style={{maxWidth:700,margin:"0 auto",padding:"0 20px",display:"flex",overflowX:"auto"}}>
          {[["session","Session"],["journal","Prayer"],["history","Past Sessions"],["profile","My Profile"]].map(([v,l])=>(
            <button key={v} onClick={()=>setTab(v)} style={{padding:"13px 16px",background:"transparent",border:"none",borderBottom:"2px solid "+(tab===v?C.acc:"transparent"),color:tab===v?C.acc:C.muted,fontSize:13,cursor:"pointer",fontWeight:tab===v?700:400,transition:"all 0.2s",whiteSpace:"nowrap"}}>{l}</button>
          ))}
        </div>
      </div>

      {logoutConfirm&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:16,padding:"28px 24px",maxWidth:340,width:"100%",textAlign:"center"}}>
            <p style={{fontSize:16,color:C.white,marginBottom:8,fontWeight:600}}>Sign out of Sjalavard?</p>
            <p style={{fontSize:13,color:C.muted,marginBottom:22,lineHeight:1.6}}>Your sessions are saved and will be here when you return.</p>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{if(window.netlifyIdentity)window.netlifyIdentity.logout();onLogout();}} style={{flex:1,padding:"11px",background:C.rose,border:"none",borderRadius:9,color:"#fff",fontSize:13,cursor:"pointer",fontWeight:700}}>Sign Out</button>
              <button onClick={()=>setLogoutConfirm(false)} style={{flex:1,padding:"11px",background:"transparent",border:"1px solid "+C.border,borderRadius:9,color:C.muted,fontSize:13,cursor:"pointer"}}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {showCrisis&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:C.card,border:"1px solid "+C.rose,borderRadius:16,padding:"28px 24px",maxWidth:360,width:"100%"}}>
            <p style={{fontSize:18,marginBottom:8}}>💙</p>
            <p style={{fontSize:16,color:C.white,marginBottom:10,fontWeight:600,fontFamily:"'Playfair Display',serif"}}>You are not alone.</p>
            <p style={{fontSize:13,color:C.muted,marginBottom:18,lineHeight:1.7}}>What you shared suggests you may be in significant pain. Sjal is here for you, and so are others who are trained to help right now.</p>
            <div style={{background:"rgba(224,128,144,0.1)",border:"1px solid rgba(224,128,144,0.3)",borderRadius:10,padding:"14px 16px",marginBottom:18}}>
              <p style={{fontSize:13,color:C.white,fontWeight:600,marginBottom:4}}>988 Suicide and Crisis Lifeline</p>
              <p style={{fontSize:13,color:C.muted,marginBottom:6}}>Call or text <strong style={{color:C.white}}>988</strong> — available 24/7</p>
              <p style={{fontSize:12,color:C.dim}}>Free, confidential support from trained counselors.</p>
            </div>
            <Btn onClick={()=>setShowCrisis(false)}>I understand — continue to Sjal</Btn>
          </div>
        </div>
      )}

      <div style={{maxWidth:700,margin:"0 auto",padding:"24px 16px 120px"}}>

        {tab==="session"&&(
          <div>
            {/* Daily verse */}
            <div style={{background:"rgba(91,184,212,0.06)",border:"1px solid rgba(91,184,212,0.2)",borderRadius:12,padding:"14px 18px",marginBottom:20}}>
              <p style={{fontSize:10,color:C.acc,letterSpacing:1,fontWeight:700,marginBottom:5}}>TODAY — {verse.ref.toUpperCase()}</p>
              <p style={{fontSize:13,color:C.muted,fontStyle:"italic",lineHeight:1.7,fontFamily:"'Playfair Display',Georgia,serif"}}>"{verse.text}"</p>
            </div>

            {/* Daily check-in */}
            {!checkinDone?(
              <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:14,padding:"18px 20px",marginBottom:20}}>
                <p style={{fontSize:13,color:C.white,fontWeight:600,marginBottom:4}}>Daily Check-in</p>
                <p style={{fontSize:12,color:C.muted,marginBottom:14}}>A quick pulse — how are you today?</p>
                <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
                  {["Peaceful","Hopeful","Okay","Tired","Anxious","Struggling"].map(m=>(
                    <button key={m} onClick={()=>setCheckinMood(m)} style={{padding:"6px 14px",background:checkinMood===m?"rgba(91,184,212,0.2)":C.surf,border:"1.5px solid "+(checkinMood===m?C.acc:C.border),borderRadius:20,color:checkinMood===m?C.acc:C.muted,fontSize:12,cursor:"pointer",fontWeight:checkinMood===m?700:400}}>{m}</button>
                  ))}
                </div>
                <input value={checkinNote} onChange={e=>setCheckinNote(e.target.value)} placeholder="One word or sentence (optional)..." style={{width:"100%",background:C.surf,border:"1px solid "+C.border,borderRadius:8,padding:"9px 12px",color:C.white,fontSize:13,marginBottom:10}}/>
                <button onClick={saveCheckin} disabled={!checkinMood} style={{padding:"8px 20px",background:checkinMood?C.acc:C.border,border:"none",borderRadius:8,color:C.bg,fontSize:12,cursor:checkinMood?"pointer":"default",fontWeight:700}}>Save Check-in</button>
              </div>
            ):(
              <div style={{background:"rgba(91,184,160,0.08)",border:"1px solid rgba(91,184,160,0.25)",borderRadius:10,padding:"10px 16px",marginBottom:20,display:"flex",alignItems:"center",gap:8}}>
                <span style={{color:C.success,fontSize:14}}>✓</span>
                <p style={{fontSize:12,color:C.muted,margin:0}}>Daily check-in complete.</p>
              </div>
            )}

            {restored&&(

                      </div>
                    )}
                    {s.msgs&&s.msgs.length>0&&<p style={{fontSize:10,color:C.dim,margin:"0 0 10px",letterSpacing:0.3}}>{s.msgs.length} EXCHANGES WITH SJAL</p>}
                    <button onClick={async()=>{if(s._id)await dbDeleteSession(s._id);setSessions(prev=>prev.filter((_,si)=>si!==i));setExpanded(null);}} style={{background:"transparent",border:"1px solid rgba(224,128,144,0.3)",borderRadius:7,padding:"4px 10px",color:C.rose,fontSize:10,cursor:"pointer",letterSpacing:0.3}}>DELETE</button>
                  </div>
                )}
              </div>
            ))}
          </div>
        )}

        {tab==="profile"&&(
          <div className="fi">
            <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:600,marginBottom:4,letterSpacing:-0.5}}>My Profile</h2>
            <p style={{color:C.muted,fontSize:13,marginBottom:22}}>How Sjal knows you.</p>
            <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:13,padding:"18px 20px",marginBottom:12}}>
              <p style={{fontSize:10,color:C.acc,letterSpacing:1,textTransform:"uppercase",fontWeight:700,marginBottom:10}}>About You</p>
              <p style={{fontSize:14,color:C.white,marginBottom:4}}>{profile.firstName||"Name not set"}</p>
              <p style={{fontSize:11,color:C.dim}}>{email}</p>
            </div>
            <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:13,padding:"18px 20px",marginBottom:12}}>
              <p style={{fontSize:10,color:C.acc,letterSpacing:1,textTransform:"uppercase",fontWeight:700,marginBottom:10}}>Your Struggles</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {profile.struggles&&profile.struggles.length?profile.struggles.map(s=>(
                  <span key={s} style={{background:"rgba(91,184,212,0.12)",border:"1px solid rgba(91,184,212,0.25)",borderRadius:20,padding:"3px 10px",fontSize:11,color:C.muted}}>{s}</span>
                )):<p style={{color:C.dim,fontSize:13}}>None set</p>}
              </div>
            </div>
            <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:13,padding:"18px 20px",marginBottom:12}}>
              <p style={{fontSize:10,color:C.acc,letterSpacing:1,textTransform:"uppercase",fontWeight:700,marginBottom:10}}>Your Goals</p>
              {profile.goals&&profile.goals.length?profile.goals.map((g,i)=>(
                <p key={i} style={{fontSize:13,color:C.muted,marginBottom:5,lineHeight:1.5}}>· {g}</p>
              )):<p style={{color:C.dim,fontSize:13}}>None set</p>}
            </div>
            <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:13,padding:"18px 20px",marginBottom:20}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <p style={{fontSize:10,color:C.acc,letterSpacing:1,textTransform:"uppercase",fontWeight:700}}>Favorite Authors</p>
                <button onClick={()=>setEditAuthors(!editAuthors)} style={{background:"transparent",border:"1px solid "+C.border,borderRadius:6,padding:"3px 10px",color:C.muted,fontSize:11,cursor:"pointer"}}>{editAuthors?"Cancel":"Edit"}</button>
              </div>
              {!editAuthors?(
                profile.authors&&profile.authors.length?(
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {profile.authors.map(a=>(
                      <span key={a} style={{background:"rgba(91,184,212,0.12)",border:"1px solid rgba(91,184,212,0.25)",borderRadius:20,padding:"3px 10px",fontSize:11,color:C.muted}}>{a}</span>
                    ))}
                  </div>
                ):<p style={{color:C.dim,fontSize:13}}>None selected — Sjal will draw from classic voices.</p>
              ):(
                <div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:12}}>
                    {ALL_AUTHORS.map(a=>{const on=editAuthorsList.includes(a);const maxed=editAuthorsList.length>=10&&!on;return(
                      <button key={a} onClick={()=>{if(!maxed){if(on)setEditAuthorsList(p=>p.filter(x=>x!==a));else setEditAuthorsList(p=>[...p,a]);}}} style={{background:on?"rgba(91,184,212,0.2)":C.surf,border:"1.5px solid "+(on?C.acc:C.border),borderRadius:20,padding:"5px 11px",color:on?C.acc:maxed?C.dim:C.muted,fontSize:11,cursor:maxed?"default":"pointer",opacity:maxed?0.5:1}}>{a}</button>
                    );})}
                  </div>
                  <input value={editAuthorsOther} onChange={e=>setEditAuthorsOther(e.target.value)} placeholder="Others not listed (comma-separated)" style={{width:"100%",background:C.surf,border:"1px solid "+C.border,borderRadius:8,padding:"10px 13px",color:C.white,fontSize:13,marginBottom:10}}/>
                  <button onClick={saveEditedAuthors} style={{padding:"9px 18px",background:C.acc,border:"none",borderRadius:8,color:C.bg,fontSize:12,cursor:"pointer",fontWeight:700}}>Save Authors</button>
                </div>
              )}
            </div>
            <div style={{background:"rgba(224,128,144,0.08)",border:"1px solid rgba(224,128,144,0.25)",borderRadius:13,padding:"18px 20px",marginBottom:20}}>
              <p style={{fontSize:13,color:C.rose,fontWeight:600,marginBottom:5}}>Account</p>
              <p style={{fontSize:12,color:C.muted,marginBottom:14,lineHeight:1.6}}>To reset your password, visit{" "}<a href="https://sjalavard.netlify.app/.netlify/identity/recover" target="_blank" rel="noopener noreferrer" style={{color:C.acc,textDecoration:"none"}}>password recovery</a>.</p>
              <button onClick={()=>setLogoutConfirm(true)} style={{background:"transparent",border:"1px solid rgba(224,128,144,0.4)",borderRadius:7,padding:"7px 14px",color:C.rose,fontSize:12,cursor:"pointer",fontWeight:500}}>Sign Out</button>
            </div>
            <div style={{textAlign:"center",paddingTop:22,borderTop:"1px solid "+C.border}}>
              <p style={{fontSize:12,color:C.dim,marginBottom:10}}>A ministry tool of <a href={FH_URL} target="_blank" rel="noopener noreferrer" style={{color:C.acc,textDecoration:"none",fontWeight:600}}>Foster Hope Ministries</a></p>
              <a href={FH_URL} target="_blank" rel="noopener noreferrer" style={{display:"inline-block",padding:"8px 20px",border:"1px solid rgba(91,184,212,0.4)",borderRadius:20,color:C.acc,fontSize:12,textDecoration:"none",fontWeight:600}}>♥ Give to Foster Hope</a>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Root ──────────────────────────────────────────────────────

function Root(){
  const [niUser,setNiUser]=useState(null);
  const [niReady,setNiReady]=useState(false);
  const [profileDone,setProfileDone]=useState(null);

  useEffect(()=>{
    const ni=window.netlifyIdentity;
    if(!ni){setNiReady(true);return;}
    const timeout=setTimeout(()=>setNiReady(true),3000);
    ni.on("init",user=>{clearTimeout(timeout);setNiUser(user||null);setNiReady(true);});
    ni.on("login",user=>{setNiUser(user);ni.close();});
    ni.on("logout",()=>{setNiUser(null);setProfileDone(null);});
    ni.on("error",err=>{console.error(err);setNiReady(true);});
    const current=ni.currentUser?ni.currentUser():null;
    if(current){clearTimeout(timeout);setNiUser(current);setNiReady(true);}
    ni.init();
    return()=>clearTimeout(timeout);
  },[]);

  useEffect(()=>{
    if(!niReady||!niUser)return;
    dbProfileDone(niUser.id).then(done=>setProfileDone(done));
  },[niReady,niUser]);

  if(!niReady) return(
    <div style={{minHeight:"100vh",background:"#0f2d42",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center"}}><SvgMark/><p style={{color:"#8ab8cc",fontSize:13,letterSpacing:1,textTransform:"uppercase"}}>Loading...</p></div>
    </div>
  );

  if(!niUser) return <Landing/>;

  if(profileDone===null) return(
    <div style={{minHeight:"100vh",background:"#0f2d42",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center"}}><SvgMark/><p style={{color:"#8ab8cc",fontSize:13,letterSpacing:1,textTransform:"uppercase"}}>Loading your space...</p></div>
    </div>
  );

  if(!profileDone) return <ProfileSetup uid={niUser.id} email={niUser.email} onDone={()=>setProfileDone(true)}/>;

  return <App uid={niUser.id} email={niUser.email} onLogout={()=>setNiUser(null)}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);

</script>
</body>
</html>
