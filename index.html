// ── localStorage helpers (namespaced by user ID) ──────────────
function lsKey(uid,k){return "sj_"+uid+"_"+k;}
function lsGet(k,d,uid){
  try{
    const key = uid ? lsKey(uid,k) : k;
    const v=localStorage.getItem(key);
    return v?JSON.parse(v):d;
  }catch{return d;}
}
function lsSet(k,v,uid){
  try{
    const key = uid ? lsKey(uid,k) : k;
    localStorage.setItem(key,JSON.stringify(v));
  }catch{}
}
function lsDel(k,uid){
  try{
    const key = uid ? lsKey(uid,k) : k;
    localStorage.removeItem(key);
  }catch{}
}

// ── AI System Prompt ──────────────────────────────────────────
function buildSystem(p, sessions){
  const goals = p.goals&&p.goals.length ? p.goals.map((g,i)=>(i+1)+". "+g).join("\n") : "Not specified.";
  const struggles = p.struggles&&p.struggles.length ? p.struggles.join(", ") : "Not specified.";

  const authorsLine = p.authors&&p.authors.length
    ? "\nThis person's favorite Christian authors are: "+p.authors.join(", ")+". When relevant, draw naturally on their thought, voice, and works — but only when it genuinely fits. Do not force it."
    : "\nDraw from Brennan Manning, Dallas Willard, Richard Foster, CS Lewis, and Dr. Caroline Leaf naturally.";

  let memoryLine = "";
  if(sessions&&sessions.length>0){
    const recent = sessions.slice(0,5).filter(s=>s.opening||s.gratitude);
    if(recent.length>0){
      memoryLine = "\n\nThis person's recent session history (reference naturally if it connects, never force it):\n";
      memoryLine += recent.map(s=>{
        let line = s.date+": ";
        if(s.opening) line += s.opening.slice(0,120);
        if(s.moods&&s.moods.length) line += " [Mood: "+s.moods.slice(0,2).join(", ")+"]";
        if(s.distortion) line += " [Pattern: "+s.distortion+"]";
        return line;
      }).join("\n");
    }
  }

  return "You are Sjal, a wise Christian life coach inside Sjalavard Soul Care.\nYou combine CBT (David Burns), biblical truth, and Spirit-led pastoral care.\nDr. Caroline Leaf's neuroscience-based approach to mind, thought, and mental health is a core part of how you think and respond — draw from her work on neuroplasticity, toxic thoughts, and the mind-brain-body connection regularly and naturally."+authorsLine+"\nPrioritize grace, identity in Christ, and Spirit transformation.\n"+(p.firstName?"The persons name is "+p.firstName+".\n":"")+"Faith background: "+(p.faith||"Christian")+".\nKey struggles: "+struggles+".\nGrowth goals:\n"+goals+"\nWatch for cognitive distortions. Be warm but direct. No flattery or filler.\nSession arc: Opening=validate+1 question. Middle=name distortion+biblical perspective+1 question. Closing=summarize+reframe+prayer+pause statement.\nKeep sessions to 4-6 exchanges. This is holy ground."+memoryLine;
}

// ── Weekly Report ─────────────────────────────────────────────
function sendWeeklyReport(uid, sessions){
  try{
    const lastKey = "sj_"+uid+"_last_report";
    const last = localStorage.getItem(lastKey);
    const now = Date.now();
    if(last && (now - parseInt(last)) < 7*24*60*60*1000) return;
    const weekAgo = now - 7*24*60*60*1000;
    const thisWeek = sessions.filter(s=>{
      try{ return new Date(s.savedAt||s.date).getTime()>weekAgo; }catch{return false;}
    });
    const topics = [];
    sessions.slice(0,10).forEach(s=>{
      if(s.distortion) topics.push(s.distortion);
      if(s.moods) topics.push(...s.moods.slice(0,1));
    });
    const topTopics = [...new Set(topics)].slice(0,5).join(", ");
    let streak = 0;
    const today = new Date(); today.setHours(0,0,0,0);
    for(let i=0;i<30;i++){
      const d = new Date(today); d.setDate(d.getDate()-i);
      const ds = d.toLocaleDateString("en-US");
      if(sessions.some(s=>s.date===ds||s.date===d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"}))){ streak++; }
      else if(i>0){ break; }
    }
    const fd = new FormData();
    fd.append("form-name","sjalavard-weekly-report");
    fd.append("week",new Date().toISOString().slice(0,10));
    fd.append("sessions_this_week",thisWeek.length);
    fd.append("streak",streak);
    fd.append("top_topics",topTopics);
    fetch("/",{method:"POST",body:fd}).catch(()=>{});
    localStorage.setItem(lastKey,String(now));
  }catch(e){}
}

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return r+","+g+","+b;
}

          <div className="fi">
            <Dots step={1} total={2}/>
            <div style={{textAlign:"center",marginBottom:22}}><SvgMark/><h2 style={{fontFamily:"'Playfair Display',serif",fontSize:24,color:C.white,fontWeight:600,marginBottom:6}}>Your Favorite Christian Authors</h2><p style={{color:C.muted,fontSize:14,lineHeight:1.6}}>Select up to 10. Sjal will weave their voice into sessions when it fits.</p></div>
            <Card>
              <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:18}}>
                {ALL_AUTHORS.map(a=>{
                  const on=authors.includes(a);
                  const maxed=authors.length>=10&&!on;
                  return(
                    <button key={a} onClick={()=>!maxed&&toggleA(a)} style={{background:on?"rgba(91,184,212,0.2)":C.surf,border:"1.5px solid "+(on?C.acc:C.border),borderRadius:20,padding:"6px 12px",color:on?C.acc:maxed?C.dim:C.muted,fontSize:12,cursor:maxed?"default":"pointer",fontWeight:on?700:400,opacity:maxed?0.5:1}}>{a}</button>
                  );
                })}
              </div>
              <div style={{marginBottom:18}}>
                <label style={{fontSize:11,color:C.muted,letterSpacing:1,textTransform:"uppercase",fontWeight:600,display:"block",marginBottom:7}}>Others not listed (comma-separated)</label>
                <input value={authorsOther} onChange={e=>setAuthorsOther(e.target.value)} placeholder="e.g. Dietrich Bonhoeffer, Corrie ten Boom"
                  style={{width:"100%",background:C.surf,border:"1.5px solid "+C.border,borderRadius:10,padding:"11px 14px",color:C.white,fontSize:14}}/>
              </div>
              <p style={{fontSize:11,color:C.dim,marginBottom:16,textAlign:"center"}}>{authors.length}/10 selected</p>
              <Btn onClick={finishAuthors}>Enter Sjalavard →</Btn>
              <button onClick={finishAuthors} style={{width:"100%",marginTop:10,padding:"11px",background:"transparent",border:"none",color:C.dim,fontSize:13,cursor:"pointer"}}>Skip</button>
            </Card>
          </div>
        )}

      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────

function App({uid, email, onLogout}){
  const profile = lsGet("profile",{},uid);
  const sessions0 = lsGet("sessions",[],uid);
  const sysPrompt = buildSystem(profile, sessions0);

  const [phase,setPhase]=useState("mood");
  const [moods,setMoods]=useState([]);
  const [text,setText]=useState("");
  const [msgs,setMsgs]=useState([]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const [distortion,setDistortion]=useState(null);
  const [err,setErr]=useState(null);
  const [lastHist,setLastHist]=useState(null);
  const [sessions,setSessions]=useState(sessions0);
  const [tab,setTab]=useState("session");
  const [restored,setRestored]=useState(false);
  const [gratitude,setGratitude]=useState(["","",""]);
  const [summary,setSummary]=useState("");
  const [summaryLoading,setSummaryLoading]=useState(false);
  const [expanded,setExpanded]=useState(null);
  const [logoutConfirm,setLogoutConfirm]=useState(false);
  const [editAuthors,setEditAuthors]=useState(false);
  const [editAuthorsList,setEditAuthorsList]=useState(profile.authors||[]);
  const [editAuthorsOther,setEditAuthorsOther]=useState("");
  const bottomRef=useRef(null);

  useEffect(()=>{
    const d=lsGet("draft",null,uid);
    if(d&&(d.msgs&&d.msgs.length>0||d.text)){
      setMoods(d.moods||[]);setText(d.text||"");setMsgs(d.msgs||[]);
      setDistortion(d.distortion||null);setPhase(d.phase||"mood");setRestored(true);
    }
    sendWeeklyReport(uid, sessions0);
  },[]);

  useEffect(()=>{
    if(phase==="mood"&&moods.length===0)return;
    lsSet("draft",{phase,moods,text,msgs,distortion},uid);
  },[phase,moods,text,msgs,distortion]);

  useEffect(()=>{bottomRef.current&&bottomRef.current.scrollIntoView({behavior:"smooth"});},[msgs,loading]);

  const moodObjs=moods.map(l=>MOODS.find(m=>m.l===l)).filter(Boolean);
  const firstName = profile.firstName ? profile.firstName.split(" ")[0] : "";

  async function callCoach(hist){
    setLoading(true);setLastHist(hist);setErr(null);
    try{
      const count=hist.filter(m=>m.role==="user").length;
      const close=count>=5?"\n\nINSTRUCTION: Close this session now. Summarize key insight, offer a reframe, close with a short prayer, end with 'This feels like a good place to pause.'":"";
      const res=await fetch("/api/gemini",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          systemInstruction:{parts:[{text:sysPrompt+close}]},
          contents:hist.map(m=>({role:m.role==="assistant"?"model":"user",parts:[{text:m.content}]})),
          generationConfig:{maxOutputTokens:3000},
        }),
      });
      if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e&&e.error&&e.error.message||"Error "+res.status);}
      const data=await res.json();
      const reply=data.candidates&&data.candidates[0]&&data.candidates[0].content&&data.candidates[0].content.parts&&data.candidates[0].content.parts[0]&&data.candidates[0].content.parts[0].text||"I am here. Take your time.";
      setMsgs(prev=>[...prev,{role:"coach",content:reply}]);
    }catch(e){setErr(e.message||"Connection interrupted.");}
    setLoading(false);
  }

  async function startSession(){
    if(!text.trim())return;
    const ms=moods.map((l,i)=>["Primary","Secondary","Third"][i]+" mood: "+l).join(", ");
    setMsgs([{role:"user",content:text}]);setPhase("coach");
    await callCoach([{role:"user",content:"My moods: "+ms+".\n\n"+text}]);
  }

  async function sendMsg(){
    if(!input.trim()||loading)return;
    const m=input.trim();setInput("");setErr(null);
    const updated=[...msgs,{role:"user",content:m}];setMsgs(updated);
    const ms=moods.map((l,i)=>["Primary","Secondary","Third"][i]+" mood: "+l).join(", ");
    await callCoach([
      {role:"user",content:"Moods: "+ms+". Opening: "+(msgs[0]&&msgs[0].content||"")},
      ...updated.slice(1).map(x=>({role:x.role==="coach"?"assistant":"user",content:x.content})),
    ]);
  }

  async function generateSummary(){
    setSummaryLoading(true);
    setSummary("");
    setPhase("summary");
    try{
      const distortionLine = distortion ? "Cognitive distortion identified: "+distortion+"." : "No specific cognitive distortion was named.";
      const history = msgs.map(function(m){ return (m.role==="coach"?"Sjal":"User")+": "+m.content; }).join("\n");
      const prompt = "Based on this soul care session, write a brief warm closing summary (3-5 sentences). Include: 1) The core theme or struggle they brought. 2) A key insight or reframe from the session. 3) "+distortionLine+" End with one short sentence of encouragement.\n\nSession:\n"+history;
      const res = await fetch("/api/gemini",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          contents:[{role:"user",parts:[{text:prompt}]}],
          generationConfig:{maxOutputTokens:300},
        }),
      });
      const data = await res.json();
      const reply = data.candidates&&data.candidates[0]&&data.candidates[0].content&&data.candidates[0].content.parts&&data.candidates[0].content.parts[0]&&data.candidates[0].content.parts[0].text;
      setSummary(reply||"This was a meaningful time. Carry what was shared with you today.");
    }catch(e){
      setSummary("This was a meaningful time. Carry what was shared with you today.");
    }
    setSummaryLoading(false);
  }

  function saveSession(){
    const s={
      date:new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"}),
      time:new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"}),
      savedAt:Date.now(),
      moods:[...moods],distortion,msgs:[...msgs],opening:text,gratitude:[...gratitude],summary,
    };
    const ns=[s,...sessions];setSessions(ns);lsSet("sessions",ns,uid);lsDel("draft",uid);
    setPhase("mood");setMoods([]);setText("");setMsgs([]);setInput("");
    setDistortion(null);setErr(null);setLastHist(null);setRestored(false);setGratitude(["","",""]);setSummary("");
  }

  function toggleMood(l){
    const i=moods.indexOf(l);
    if(i>-1)setMoods(p=>p.filter(x=>x!==l));
    else if(moods.length<3)setMoods(p=>[...p,l]);
  }

  function saveEditedAuthors(){
    const extras = editAuthorsOther.split(",").map(s=>s.trim()).filter(Boolean);
    const merged = [...editAuthorsList,...extras].slice(0,10);
    const updated = {...profile, authors:merged};
    lsSet("profile",updated,uid);
    setEditAuthors(false);
  }

  const progPhases=["mood","share","coach","summary","gratitude"];
  const progIdx=progPhases.indexOf(phase);

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.white}}>

      <div style={{background:"rgba(12,28,42,0.95)",backdropFilter:"blur(8px)",borderBottom:"1px solid "+C.border,position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:700,margin:"0 auto",padding:"0 20px",display:"flex",alignItems:"center",justifyContent:"space-between",height:56}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <svg width="24" height="24" viewBox="0 0 72 72" fill="none">
              <rect width="72" height="72" rx="14" fill="rgba(91,184,212,0.2)"/>
              <line x1="36" y1="18" x2="36" y2="54" stroke={C.acc} strokeWidth="2.5" strokeLinecap="round"/>
              <line x1="22" y1="36" x2="50" y2="36" stroke={C.acc} strokeWidth="2.5" strokeLinecap="round"/>
              <circle cx="36" cy="36" r="6" stroke={C.acc} strokeWidth="1.5" fill="none"/>
            </svg>
            <span style={{fontFamily:"'Playfair Display',serif",fontSize:17,fontWeight:600,letterSpacing:-0.3}}>Sjalavard</span>
            <span style={{fontSize:10,color:C.muted,letterSpacing:1,textTransform:"uppercase"}}>Soul Care</span>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <span style={{fontSize:11,color:C.dim}}>{new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>
            <button onClick={()=>setLogoutConfirm(true)} style={{background:"transparent",border:"1px solid "+C.border,borderRadius:7,padding:"4px 10px",color:C.dim,fontSize:10,cursor:"pointer",fontWeight:600,letterSpacing:0.5}}>SIGN OUT</button>
          </div>
        </div>
      </div>

      <div style={{background:C.surf,borderBottom:"1px solid "+C.border}}>
        <div style={{maxWidth:700,margin:"0 auto",padding:"0 20px",display:"flex"}}>
          {[["session","Session"],["history","Past Sessions"],["profile","My Profile"]].map(([v,l])=>(
            <button key={v} onClick={()=>setTab(v)} style={{padding:"13px 18px",background:"transparent",border:"none",borderBottom:"2px solid "+(tab===v?C.acc:"transparent"),color:tab===v?C.acc:C.muted,fontSize:13,cursor:"pointer",fontWeight:tab===v?700:400,transition:"all 0.2s"}}>{l}</button>
          ))}
        </div>
      </div>

      {logoutConfirm&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:16,padding:"28px 24px",maxWidth:340,width:"100%",textAlign:"center"}}>
            <p style={{fontSize:16,color:C.white,marginBottom:8,fontWeight:600}}>Sign out of Sjalavard?</p>
            <p style={{fontSize:13,color:C.muted,marginBottom:22,lineHeight:1.6}}>Your sessions are saved to your account and will be here when you return.</p>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{if(window.netlifyIdentity)window.netlifyIdentity.logout();onLogout();}} style={{flex:1,padding:"11px",background:C.rose,border:"none",borderRadius:9,color:"#fff",fontSize:13,cursor:"pointer",fontWeight:700}}>Sign Out</button>
              <button onClick={()=>setLogoutConfirm(false)} style={{flex:1,padding:"11px",background:"transparent",border:"1px solid "+C.border,borderRadius:9,color:C.muted,fontSize:13,cursor:"pointer"}}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      <div style={{maxWidth:700,margin:"0 auto",padding:"24px 16px 120px"}}>

        {tab==="session"&&(
          <div>
            {restored&&(
              <div style={{background:"rgba(91,184,212,0.1)",border:"1px solid rgba(91,184,212,0.3)",borderRadius:10,padding:"12px 16px",marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                <p style={{fontSize:13,color:C.acc,margin:0,fontWeight:500}}>Previous session restored.</p>
                <button onClick={()=>{lsDel("draft",uid);setPhase("mood");setMoods([]);setText("");setMsgs([]);setDistortion(null);setRestored(false);}} style={{background:"transparent",border:"1px solid "+C.border,borderRadius:7,padding:"5px 10px",color:C.muted,fontSize:11,cursor:"pointer"}}>Start fresh</button>
              </div>
            )}

            <div style={{display:"flex",gap:4,marginBottom:22}}>
              {progPhases.map((p,i)=>(
                <div key={p} style={{flex:1,height:3,borderRadius:2,background:i<=progIdx?C.acc:C.border,transition:"background 0.3s"}}/>
              ))}
            </div>

            {phase==="mood"&&(
              <div className="fi">
                <p style={{color:C.acc,fontSize:13,fontWeight:600,marginBottom:4,letterSpacing:0.3}}>{getGreeting(firstName)}</p>
                <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:600,marginBottom:6,letterSpacing:-0.5}}>How are you arriving?</h2>
                <p style={{color:C.muted,fontSize:14,marginBottom:24,lineHeight:1.7}}>Select up to 3 moods. First tap is your primary feeling.</p>
                <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:7,marginBottom:20}}>
                  {MOODS.map(m=>{
                    const rank=moods.indexOf(m.l)+1;
                    const on=rank>0;
                    return(
                      <button key={m.l} onClick={()=>toggleMood(m.l)} style={{background:on?"rgba("+hexToRgb(m.c)+",0.15)":C.surf,border:"1.5px solid "+(on?m.c:C.border),borderRadius:9,padding:"11px 4px 9px",cursor:"pointer",textAlign:"center",position:"relative",transition:"all 0.15s"}}>
                        {on&&<div style={{position:"absolute",top:3,right:3,background:m.c,borderRadius:5,width:14,height:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:"#fff",fontWeight:800}}>{rank}</div>}
                        <div style={{fontSize:10,color:on?m.c:C.muted,fontWeight:on?700:400,lineHeight:1.3}}>{m.l}</div>
                      </button>
                    );
                  })}
                </div>
                {moods.length>0&&(
                  <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:12,padding:"14px 18px",marginBottom:16}}>
                    <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:6}}>
                      {moodObjs.map((m,i)=>(
                        <span key={m.l} style={{background:"rgba("+hexToRgb(m.c)+",0.15)",border:"1px solid "+m.c+"55",borderRadius:20,padding:"3px 10px",fontSize:11,color:m.c,fontWeight:600}}>
                          {["Primary","Secondary","Third"][i]} · {m.l}
                        </span>
                      ))}
                    </div>
                    <p style={{fontSize:11,color:C.dim,margin:0}}>{moods.length<3?(3-moods.length)+" more available":"3 moods selected"}</p>
                  </div>
                )}
                <Btn onClick={()=>moods.length>0&&setPhase("share")} disabled={moods.length===0}>Continue →</Btn>
              </div>
            )}

            {phase==="share"&&(
              <div className="fi">
                <button onClick={()=>setPhase("mood")} style={{background:"transparent",border:"none",color:C.muted,cursor:"pointer",fontSize:13,marginBottom:18,padding:0}}>← Back</button>
                <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:20}}>
                  {moodObjs.map(m=><span key={m.l} style={{background:"rgba("+hexToRgb(m.c)+",0.15)",border:"1px solid "+m.c+"55",borderRadius:20,padding:"3px 10px",fontSize:11,color:m.c,fontWeight:600}}>{m.l}</span>)}
                </div>
                <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:600,marginBottom:6,letterSpacing:-0.5}}>What's on your heart?</h2>
                <p style={{color:C.muted,fontSize:14,marginBottom:16,lineHeight:1.7}}>Share freely. Nothing is too big, too small, or too messy.</p>
                <textarea value={text} onChange={e=>setText(e.target.value)} placeholder="Start wherever feels right..." rows={8}
                  style={{width:"100%",background:C.card,border:"1.5px solid "+C.border,borderRadius:12,padding:"16px",color:C.white,fontSize:15,lineHeight:1.85,resize:"vertical",fontFamily:"'Playfair Display',Georgia,serif"}}/>
                <div style={{marginTop:12}}>
                  <Btn onClick={startSession} disabled={!text.trim()}>Begin Session with Sjal →</Btn>
                </div>
              </div>
            )}

            {phase==="coach"&&(
              <div className="fi">
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,flexWrap:"wrap",gap:8}}>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
                    {moodObjs.map(m=><span key={m.l} style={{background:"rgba("+hexToRgb(m.c)+",0.15)",border:"1px solid "+m.c+"44",borderRadius:20,padding:"3px 9px",fontSize:10,color:m.c,fontWeight:600}}>{m.l}</span>)}
                  </div>
                  <div style={{display:"flex",gap:7}}>
                    <button onClick={()=>setPhase("distortions")} style={{background:distortion?"rgba(91,184,212,0.15)":C.card,border:"1px solid "+(distortion?C.acc:C.border),borderRadius:18,padding:"5px 12px",color:distortion?C.acc:C.muted,fontSize:11,cursor:"pointer",fontWeight:distortion?600:400}}>
                      {distortion?distortion.split(" ").slice(0,2).join(" ")+"...":"+ Pattern"}
                    </button>
                    <button onClick={()=>generateSummary()} style={{background:C.acc,border:"none",borderRadius:18,padding:"5px 14px",color:C.bg,fontSize:11,cursor:"pointer",fontWeight:700}}>End Session</button>
                  </div>
                </div>
                <div style={{minHeight:280,marginBottom:16}}>
                  {msgs.map((m,i)=>(
                    <div key={i} className="fi" style={{display:"flex",justifyContent:m.role==="coach"?"flex-start":"flex-end",marginBottom:18,alignItems:"flex-start"}}>
                      {m.role==="coach"&&<div style={{width:34,height:34,borderRadius:"50%",background:C.acc,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,marginRight:10,flexShrink:0,marginTop:2,color:C.bg,fontWeight:700,fontFamily:"'Playfair Display',serif"}}>S</div>}
                      <div style={{maxWidth:"76%",background:m.role==="coach"?C.card:C.acc,border:m.role==="coach"?"1px solid "+C.border:"none",borderRadius:m.role==="coach"?"4px 16px 16px 16px":"16px 4px 16px 16px",padding:"13px 17px",color:m.role==="coach"?C.white:C.bg,fontSize:14,lineHeight:1.85,fontFamily:m.role==="coach"?"'Playfair Display',Georgia,serif":"'Inter',sans-serif",whiteSpace:"pre-wrap"}}>
                        {m.content}
                      </div>
                    </div>
                  ))}
                  {loading&&(
                    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
                      <div style={{width:34,height:34,borderRadius:"50%",background:C.acc,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,color:C.bg,fontWeight:700,fontFamily:"'Playfair Display',serif"}}>S</div>
                      <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:"4px 16px 16px 16px",padding:"13px 18px"}}>
                        <span style={{color:C.muted,fontSize:18,letterSpacing:7}}>···</span>
                      </div>
                    </div>
                  )}
                  {err&&!loading&&(
                    <div style={{background:"rgba(224,128,144,0.1)",border:"1px solid rgba(224,128,144,0.3)",borderRadius:10,padding:"13px 16px",marginBottom:14}}>
                      <p style={{fontSize:13,color:C.rose,margin:"0 0 8px"}}>{err}</p>
                      <button onClick={()=>callCoach(lastHist)} style={{background:C.acc,border:"none",borderRadius:7,padding:"6px 14px",color:C.bg,fontSize:12,cursor:"pointer",fontWeight:600}}>Try Again</button>
                    </div>
                  )}
                  <div ref={bottomRef}/>
                </div>
                <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:14,padding:4,display:"flex",gap:4,alignItems:"flex-end"}}>
                  <textarea value={input} onChange={e=>setInput(e.target.value)}
                    onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();}}}
                    placeholder="Respond to Sjal..." rows={3}
                    style={{flex:1,background:"transparent",border:"none",padding:"11px 13px",color:C.white,fontSize:14,lineHeight:1.75,resize:"none",fontFamily:"'Playfair Display',Georgia,serif"}}/>
                  <button onClick={sendMsg} disabled={loading||!input.trim()} style={{padding:"11px 16px",background:input.trim()&&!loading?C.acc:C.border,border:"none",borderRadius:10,color:C.bg,fontSize:16,cursor:input.trim()&&!loading?"pointer":"default",fontWeight:700,margin:3}}>→</button>
                </div>
                <p style={{fontSize:10,color:C.dim,textAlign:"center",marginTop:8,letterSpacing:0.3}}>ENTER TO SEND · SHIFT+ENTER FOR NEW LINE</p>
                <div style={{position:"fixed",bottom:20,right:20,zIndex:200}}>
                  <button onClick={()=>generateSummary()} style={{background:C.acc,border:"none",borderRadius:50,padding:"13px 20px",color:C.bg,fontSize:13,cursor:"pointer",fontWeight:700,boxShadow:"0 6px 20px rgba(0,0,0,0.4)"}}>End Session ✦</button>
                </div>
              </div>
            )}

            {phase==="summary"&&(
              <div className="fi">
                <div style={{textAlign:"center",marginBottom:24}}>
                  <div style={{width:52,height:52,borderRadius:"50%",background:"rgba(91,184,212,0.15)",border:"2px solid "+C.acc,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px",fontSize:20,color:C.acc,fontWeight:700,fontFamily:"'Playfair Display',serif"}}>S</div>
                  <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:600,marginBottom:6,letterSpacing:-0.5}}>Session Summary</h2>
                  <p style={{color:C.muted,fontSize:14,lineHeight:1.7}}>A reflection from Sjal before you go.</p>
                </div>
                {summaryLoading?(
                  <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:16,padding:"28px 24px",textAlign:"center"}}>
                    <span style={{color:C.muted,fontSize:22,letterSpacing:8}}>···</span>
                    <p style={{color:C.dim,fontSize:13,marginTop:10}}>Sjal is reflecting on your session...</p>
                  </div>
                ):(
                  <div>
                    <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:16,padding:"24px 22px",marginBottom:16}}>
                      <p style={{fontSize:15,color:C.white,lineHeight:1.9,fontFamily:"'Playfair Display',Georgia,serif",whiteSpace:"pre-wrap"}}>{summary}</p>
                    </div>
                    {distortion&&(
                      <div style={{background:"rgba(91,184,212,0.08)",border:"1px solid rgba(91,184,212,0.25)",borderRadius:12,padding:"14px 18px",marginBottom:16,display:"flex",gap:12,alignItems:"flex-start"}}>
                        <div style={{fontSize:16,marginTop:1}}>🔍</div>
                        <div>
                          <p style={{fontSize:11,color:C.acc,fontWeight:700,letterSpacing:0.5,marginBottom:4}}>PATTERN IDENTIFIED</p>
                          <p style={{fontSize:13,color:C.white,fontWeight:600,marginBottom:2}}>{distortion}</p>
                          <p style={{fontSize:12,color:C.muted}}>{(()=>{const d=DISTORTIONS.find(x=>x.l===distortion);return d?d.s:"";})()}</p>
                        </div>
                      </div>
                    )}
                    <Btn onClick={()=>setPhase("gratitude")}>Continue to Gratitude →</Btn>
                  </div>
                )}
              </div>
            )}

            {phase==="gratitude"&&(
              <div className="fi">
                <div style={{textAlign:"center",marginBottom:28}}>
                  <div style={{width:52,height:52,borderRadius:"50%",background:"rgba(91,184,160,0.15)",border:"2px solid "+C.success,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px",fontSize:22}}>✦</div>
                  <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:600,marginBottom:6,letterSpacing:-0.5}}>Before you go</h2>
                  <p style={{color:C.muted,fontSize:14,lineHeight:1.7}}>Name three things you are grateful for right now.</p>
                </div>
                {gratitude.map((g,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
                    <div style={{width:26,height:26,borderRadius:"50%",background:"rgba(91,184,212,0.15)",border:"1px solid rgba(91,184,212,0.4)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:11,color:C.acc,fontWeight:700}}>{i+1}</div>
                    <input value={g} onChange={e=>{const u=[...gratitude];u[i]=e.target.value;setGratitude(u);}}
                      placeholder={["Something good from today...","Someone you appreciate...","A gift you often overlook..."][i]}
                      style={{flex:1,background:C.card,border:"1.5px solid "+C.border,borderRadius:10,padding:"12px 14px",color:C.white,fontSize:14,fontFamily:"'Playfair Display',Georgia,serif"}}/>
                  </div>
                ))}
                <div style={{marginTop:16}}>
                  <Btn onClick={saveSession} disabled={gratitude.filter(g=>g.trim()).length===0}>Complete Session ✦</Btn>
                </div>
              </div>
            )}

            {phase==="distortions"&&(
              <div className="fi">
                <button onClick={()=>setPhase("coach")} style={{background:"transparent",border:"none",color:C.muted,cursor:"pointer",fontSize:13,marginBottom:22,padding:0}}>← Back to Session</button>
                <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:600,marginBottom:6,letterSpacing:-0.5}}>Name a Pattern</h2>
                <p style={{color:C.muted,fontSize:14,marginBottom:20,lineHeight:1.7}}>Awareness is the first step toward freedom.</p>
                {DISTORTIONS.map(d=>{
                  const on=distortion===d.l;
                  return(
                    <button key={d.l} onClick={()=>setDistortion(distortion===d.l?null:d.l)} style={{background:on?"rgba(91,184,212,0.15)":C.surf,border:"1.5px solid "+(on?C.acc:C.border),borderRadius:9,padding:"11px 14px",cursor:"pointer",textAlign:"left",width:"100%",marginBottom:7,transition:"all 0.15s"}}>
                      <div style={{fontSize:13,color:on?C.acc:C.white,fontWeight:on?600:400}}>{d.l}</div>
                      <div style={{fontSize:11,color:C.muted,marginTop:2}}>{d.s}</div>
                    </button>
                  );
                })}
                <div style={{marginTop:14}}>
                  <Btn onClick={()=>setPhase("coach")}>Return to Session →</Btn>
                </div>
              </div>
            )}
          </div>
        )}

        {tab==="history"&&(
          <div>
            <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:600,marginBottom:4,letterSpacing:-0.5}}>Your Journey</h2>
            <p style={{color:C.muted,fontSize:13,marginBottom:22}}>{sessions.length} session{sessions.length!==1?"s":""} completed</p>
            {sessions.length===0?(
              <div style={{textAlign:"center",padding:"70px 20px",color:C.muted}}>
                <div style={{fontSize:40,marginBottom:14,opacity:0.3}}>✦</div>
                <p style={{fontSize:15,lineHeight:1.7}}>Your completed sessions will appear here.</p>
              </div>
            ):sessions.map((s,i)=>(
              <div key={i} style={{background:C.card,borderRadius:14,border:"1px solid "+C.border,marginBottom:10,overflow:"hidden"}}>
                <div style={{padding:"16px 18px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}} onClick={()=>setExpanded(expanded===i?null:i)}>
                  <div>
                    <p style={{fontSize:14,color:C.white,marginBottom:2,fontWeight:600}}>{s.date}</p>
                    <p style={{fontSize:11,color:C.muted,margin:0}}>{s.time}</p>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{display:"flex",gap:4}}>
                      {s.moods&&s.moods.slice(0,2).map(l=>{const m=MOODS.find(x=>x.l===l);return m?<span key={l} style={{background:"rgba("+hexToRgb(m.c)+",0.15)",border:"1px solid "+m.c+"44",borderRadius:20,padding:"2px 7px",fontSize:9,color:m.c,fontWeight:600}}>{l}</span>:null;})}
                    </div>
                    <span style={{color:C.dim,fontSize:14}}>{expanded===i?"↑":"↓"}</span>
                  </div>
                </div>
                {expanded===i&&(
                  <div style={{borderTop:"1px solid "+C.border,padding:"14px 18px"}}>
                    {s.moods&&s.moods.length>0&&(
                      <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
                        {s.moods.map(l=>{const m=MOODS.find(x=>x.l===l);return m?<span key={l} style={{background:"rgba("+hexToRgb(m.c)+",0.15)",border:"1px solid "+m.c+"44",borderRadius:20,padding:"2px 8px",fontSize:10,color:m.c,fontWeight:600}}>{l}</span>:null;})}
                        {s.distortion&&<span style={{background:"rgba(91,184,212,0.15)",border:"1px solid rgba(91,184,212,0.3)",borderRadius:20,padding:"2px 8px",fontSize:10,color:C.acc}}>{s.distortion}</span>}
                      </div>
                    )}
                    {s.opening&&<p style={{fontSize:13,color:C.muted,lineHeight:1.65,margin:"0 0 10px",fontStyle:"italic"}}>"{s.opening.slice(0,180)}{s.opening.length>180?"...":""}"</p>}
                    {s.gratitude&&s.gratitude.filter(g=>g).length>0&&(
                      <div style={{background:C.surf,borderRadius:8,padding:"10px 12px",marginBottom:10}}>
                        <p style={{fontSize:10,color:C.acc,margin:"0 0 5px",fontWeight:700,letterSpacing:0.5}}>GRATEFUL FOR</p>
                        {s.gratitude.filter(g=>g).map((g,gi)=><p key={gi} style={{fontSize:12,color:C.muted,margin:"0 0 2px"}}>· {g}</p>)}
                      </div>
                    )}
                    {s.msgs&&s.msgs.length>0&&<p style={{fontSize:10,color:C.dim,margin:"0 0 10px",letterSpacing:0.3}}>{s.msgs.length} EXCHANGES WITH SJAL</p>}
                    <button onClick={()=>{const u=sessions.filter((_,si)=>si!==i);setSessions(u);lsSet("sessions",u,uid);setExpanded(null);}} style={{background:"transparent",border:"1px solid rgba(224,128,144,0.3)",borderRadius:7,padding:"4px 10px",color:C.rose,fontSize:10,cursor:"pointer",letterSpacing:0.3}}>DELETE</button>
                  </div>
                )}
              </div>
            ))}
          </div>
        )}

        {tab==="profile"&&(
          <div className="fi">
            <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:600,marginBottom:4,letterSpacing:-0.5}}>My Profile</h2>
            <p style={{color:C.muted,fontSize:13,marginBottom:22}}>How Sjal knows you.</p>

            <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:13,padding:"18px 20px",marginBottom:12}}>
              <p style={{fontSize:10,color:C.acc,letterSpacing:1,textTransform:"uppercase",fontWeight:700,marginBottom:10}}>About You</p>
              <p style={{fontSize:14,color:C.white,marginBottom:4}}>{profile.firstName||"Name not set"}</p>
              <p style={{fontSize:11,color:C.dim}}>{email}</p>
            </div>

            <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:13,padding:"18px 20px",marginBottom:12}}>
              <p style={{fontSize:10,color:C.acc,letterSpacing:1,textTransform:"uppercase",fontWeight:700,marginBottom:10}}>Your Struggles</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {profile.struggles&&profile.struggles.length?profile.struggles.map(s=>(
                  <span key={s} style={{background:"rgba(91,184,212,0.12)",border:"1px solid rgba(91,184,212,0.25)",borderRadius:20,padding:"3px 10px",fontSize:11,color:C.muted}}>{s}</span>
                )):<p style={{color:C.dim,fontSize:13}}>None set</p>}
              </div>
            </div>

            <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:13,padding:"18px 20px",marginBottom:12}}>
              <p style={{fontSize:10,color:C.acc,letterSpacing:1,textTransform:"uppercase",fontWeight:700,marginBottom:10}}>Your Goals</p>
              {profile.goals&&profile.goals.length?profile.goals.map((g,i)=>(
                <p key={i} style={{fontSize:13,color:C.muted,marginBottom:5,lineHeight:1.5}}>· {g}</p>
              )):<p style={{color:C.dim,fontSize:13}}>None set</p>}
            </div>

            <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:13,padding:"18px 20px",marginBottom:20}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <p style={{fontSize:10,color:C.acc,letterSpacing:1,textTransform:"uppercase",fontWeight:700}}>Favorite Authors</p>
                <button onClick={()=>setEditAuthors(!editAuthors)} style={{background:"transparent",border:"1px solid "+C.border,borderRadius:6,padding:"3px 10px",color:C.muted,fontSize:11,cursor:"pointer"}}>{editAuthors?"Cancel":"Edit"}</button>
              </div>
              {!editAuthors?(
                profile.authors&&profile.authors.length?(
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {profile.authors.map(a=>(
                      <span key={a} style={{background:"rgba(91,184,212,0.12)",border:"1px solid rgba(91,184,212,0.25)",borderRadius:20,padding:"3px 10px",fontSize:11,color:C.muted}}>{a}</span>
                    ))}
                  </div>
                ):<p style={{color:C.dim,fontSize:13}}>None selected — Sjal will draw from classic voices.</p>
              ):(
                <div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:12}}>
                    {ALL_AUTHORS.map(a=>{
                      const on=editAuthorsList.includes(a);
                      const maxed=editAuthorsList.length>=10&&!on;
                      return(
                        <button key={a} onClick={()=>{if(!maxed){if(on)setEditAuthorsList(p=>p.filter(x=>x!==a));else setEditAuthorsList(p=>[...p,a]);}}} style={{background:on?"rgba(91,184,212,0.2)":C.surf,border:"1.5px solid "+(on?C.acc:C.border),borderRadius:20,padding:"5px 11px",color:on?C.acc:maxed?C.dim:C.muted,fontSize:11,cursor:maxed?"default":"pointer",opacity:maxed?0.5:1}}>{a}</button>
                      );
                    })}
                  </div>
                  <input value={editAuthorsOther} onChange={e=>setEditAuthorsOther(e.target.value)} placeholder="Others not listed (comma-separated)"
                    style={{width:"100%",background:C.surf,border:"1px solid "+C.border,borderRadius:8,padding:"10px 13px",color:C.white,fontSize:13,marginBottom:10}}/>
                  <button onClick={saveEditedAuthors} style={{padding:"9px 18px",background:C.acc,border:"none",borderRadius:8,color:C.bg,fontSize:12,cursor:"pointer",fontWeight:700}}>Save Authors</button>
                </div>
              )}
            </div>

            <div style={{background:"rgba(224,128,144,0.08)",border:"1px solid rgba(224,128,144,0.25)",borderRadius:13,padding:"18px 20px",marginBottom:20}}>
              <p style={{fontSize:13,color:C.rose,fontWeight:600,marginBottom:5}}>Account</p>
              <p style={{fontSize:12,color:C.muted,marginBottom:14,lineHeight:1.6}}>
                To reset your password, visit{" "}
                <a href="https://www.sjalavard.com/.netlify/identity/recover" target="_blank" rel="noopener noreferrer" style={{color:C.acc,textDecoration:"none"}}>password recovery</a>.
              </p>
              <button onClick={()=>setLogoutConfirm(true)} style={{background:"transparent",border:"1px solid rgba(224,128,144,0.4)",borderRadius:7,padding:"7px 14px",color:C.rose,fontSize:12,cursor:"pointer",fontWeight:500}}>Sign Out</button>
            </div>

            <div style={{textAlign:"center",paddingTop:22,borderTop:"1px solid "+C.border}}>
              <p style={{fontSize:12,color:C.dim,marginBottom:10}}>A ministry tool of <a href={FH_URL} target="_blank" rel="noopener noreferrer" style={{color:C.acc,textDecoration:"none",fontWeight:600}}>Foster Hope Ministries</a></p>
              <a href={FH_URL} target="_blank" rel="noopener noreferrer"
                style={{display:"inline-block",padding:"8px 20px",border:"1px solid rgba(91,184,212,0.4)",borderRadius:20,color:C.acc,fontSize:12,textDecoration:"none",fontWeight:600}}>
                ♥ Give to Foster Hope
              </a>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

// ── Root ──────────────────────────────────────────────────────

function Root(){
  const [niUser,setNiUser]=useState(null);
  const [niReady,setNiReady]=useState(false);

  useEffect(()=>{
    const ni = window.netlifyIdentity;
    if(!ni){ setNiReady(true); return; }

    const timeout = setTimeout(()=>setNiReady(true), 3000);

    ni.on("init", user=>{
      clearTimeout(timeout);
      setNiUser(user||null);
      setNiReady(true);
    });
    ni.on("login", user=>{
      setNiUser(user);
      ni.close();
    });
    ni.on("logout",()=>setNiUser(null));
    ni.on("error", err=>{ console.error("Netlify Identity error",err); setNiReady(true); });

    // Race condition fix — widget may have already fired init before React mounted
    const current = ni.currentUser ? ni.currentUser() : null;
    if(current){ clearTimeout(timeout); setNiUser(current); setNiReady(true); }

    ni.init();
    return ()=>clearTimeout(timeout);
  },[]);

  if(!niReady){
    return(
      <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div style={{textAlign:"center"}}>
          <SvgMark/>
          <p style={{color:C.muted,fontSize:13,letterSpacing:1,textTransform:"uppercase"}}>Loading...</p>
        </div>
      </div>
    );
  }

  if(!niUser) return <Landing/>;

  const uid = niUser.id;
  const email = niUser.email;
  const profileDone = lsGet("profile_done",false,uid);

  if(!profileDone) return <ProfileSetup uid={uid} email={email} onDone={()=>window.location.reload()}/>;

  return <App uid={uid} email={email} onLogout={()=>setNiUser(null)}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);

</script>
</body>
