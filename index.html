<script>

// PWA standalone detection (safe - no Netlify Identity interference)
var IS_PWA = (
  window.matchMedia('(display-mode: standalone)').matches ||
  window.navigator.standalone === true ||
  document.referrer.includes('android-app://')
);
if (IS_PWA) {
  document.documentElement.setAttribute('data-pwa', 'true');
}

// Handle #access_token hash on redirect return
(function(){
  var hash = window.location.hash;
  if(hash && (hash.includes('access_token') || hash.includes('error='))) {
    window.addEventListener('load', function(){
      if(window.netlifyIdentity) {
        window.netlifyIdentity.on('login', function(){
          history.replaceState(null, '', window.location.pathname);
        });
      }
    });
  }
})();

// iOS link bleed prevention - stop internal links opening Safari
if(IS_PWA && window.navigator.standalone === true){
  document.addEventListener('click', function(e){
    var anchor = e.target.closest && e.target.closest('a[href]');
    if(!anchor) return;
    var href = anchor.getAttribute('href');
    if(href && (href.startsWith('http') || href.startsWith('mailto'))) return;
    e.preventDefault();
  });
}

</script>
